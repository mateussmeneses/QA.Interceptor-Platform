name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & format check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings)
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────
  # Type check all packages
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared-types
        run: npm run build -w @qa-interceptor/shared-types

      - name: Type-check rule-engine
        run: npx tsc --noEmit -p packages/rule-engine/tsconfig.json

      - name: Type-check extension
        run: npx tsc --noEmit -p extension/tsconfig.json

  # ─────────────────────────────────────────────────────────────────────────
  # Unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared-types
        run: npm run build -w @qa-interceptor/shared-types

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # Production build
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upload extension dist
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist-${{ github.sha }}
          path: extension/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Commitlint (PR only — verify last commit message)
  # ─────────────────────────────────────────────────────────────────────────
  commitlint:
    name: Commit Message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD --verbose
