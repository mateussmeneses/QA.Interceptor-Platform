version: 2

updates:
  # ─────────────────────────────────────────────────────────────────────────
  # Root package (monorepo devDependencies)
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
      commitlint:
        patterns:
          - "@commitlint/*"
      husky-lint-staged:
        patterns:
          - "husky"
          - "lint-staged"
      prettier:
        patterns:
          - "prettier"
          - "prettier-*"

  # ─────────────────────────────────────────────────────────────────────────
  # packages/rule-engine
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/rule-engine"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rule-engine"
      - "automated"
    commit-message:
      prefix: "chore(deps/rule-engine)"
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # ─────────────────────────────────────────────────────────────────────────
  # packages/shared-types
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/shared-types"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "shared-types"
      - "automated"
    commit-message:
      prefix: "chore(deps/shared-types)"

  # ─────────────────────────────────────────────────────────────────────────
  # extension
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "extension"
      - "automated"
    commit-message:
      prefix: "chore(deps/extension)"

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Actions
  # ─────────────────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(actions)"
